name: Deploy viewer to gh-pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install preprocessor
        run: pip install ./preprocess

      - name: Generate demo gig-map data
        run: python scripts/generate_demo_data.py --out demo-data

      - name: Run preprocessor
        run: python -m preprocess.cli demo-data --out viewer/public/graph

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci

      - name: Build viewer
        working-directory: viewer
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: viewer/dist
          branch: gh-pages
          clean-exclude: pr-preview
