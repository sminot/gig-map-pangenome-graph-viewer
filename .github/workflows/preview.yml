name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install preprocessor
        run: pip install ./preprocess

      - name: Generate demo gig-map data
        run: python scripts/generate_demo_data.py --out demo-data

      - name: Run preprocessor
        run: python -m preprocess.cli demo-data --out viewer/public/graph

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci

      - name: Type check
        working-directory: viewer
        run: npx tsc --noEmit

      - name: Build viewer with preview base path
        working-directory: viewer
        run: npx vite build --base /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/

      - name: Deploy preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: viewer/dist
          branch: gh-pages
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: false

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const previewUrl = `https://${owner}.github.io/${repo}/pr-preview/pr-${prNumber}/`;
            const body = `**Preview deployment ready**\n\n${previewUrl}\n\n_Updated for commit ${context.sha.substring(0, 7)}_`;

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
