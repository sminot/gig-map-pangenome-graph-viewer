<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gig-map Pangenome Graph Viewer</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header>
      <h1>gig-map Pangenome Graph Viewer</h1>
      <p id="status">Loading…</p>
    </header>
    <main>
      <aside id="controls">
        <section>
          <h2>Bin color</h2>
          <label for="bin-color">Attribute</label>
          <select id="bin-color"></select>
          <label for="bin-palette">Palette</label>
          <select id="bin-palette">
            <option value="viridis">Viridis (sequential)</option>
            <option value="plasma">Plasma (sequential)</option>
            <option value="category">Categorical</option>
          </select>
        </section>
        <section>
          <h2>Genome color</h2>
          <label for="genome-color">Attribute</label>
          <select id="genome-color"></select>
        </section>
        <section>
          <h2>Legend</h2>
          <div id="legend"></div>
        </section>
        <section class="help">
          <h2>Controls</h2>
          <ul>
            <li>Hover a node for details</li>
            <li>Click and drag a node — neighbors respond with force-directed physics</li>
            <li>Scroll to zoom</li>
          </ul>
        </section>
      </aside>
      <div id="sigma-container"></div>
      <div id="tooltip" class="hidden"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
